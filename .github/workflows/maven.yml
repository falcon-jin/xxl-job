name: Java CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  publish:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Determine Java version from tag
        id: java-version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          if [ "$MAJOR" -ge 3 ]; then
            echo "version=17" >> $GITHUB_OUTPUT
          else
            echo "version=8" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK for Maven Central
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps['java-version'].outputs.version }}
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Validate tag version
        shell: pwsh
        run: ./scripts/check-tag-version.ps1 $env:GITHUB_REF_NAME

      - name: Publish xxl-job-core to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -P release -pl xxl-job-core -am deploy
